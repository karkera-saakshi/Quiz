<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz App | Welcome</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #d63384;
            --primary-hover: #b92a6e;
            --bg-gradient: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 100%);
            --glass: rgba(255, 255, 255, 0.88);
            --text-dark: #32262a;
            --text-muted: #7d6a71;
            --pink-glow: rgba(214, 51, 132, 0.25);
        }

        * {
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }

        /* Decorative Animated Blobs */
        body::before, body::after {
            content: "";
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: linear-gradient(to right, #ff80ab, #d63384);
            filter: blur(100px);
            z-index: -1;
            opacity: 0.5;
            animation: float-blobs 10s infinite alternate ease-in-out;
        }
        body::before { top: -100px; left: -100px; }
        body::after { bottom: -100px; right: -100px; animation-delay: -5s; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px 40px;
            width: 90%;
            max-width: 420px;
            border-radius: 35px;
            box-shadow: 0 30px 60px -12px rgba(214, 51, 132, 0.3);
            text-align: center;
            animation: cardEntrance 1s cubic-bezier(0.2, 0.8, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.7);
            position: relative;
        }

        .icon-badge {
            width: 80px;
            height: 80px;
            background: white;
            color: var(--primary);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 30px;
            font-size: 35px;
            box-shadow: 0 15px 25px var(--pink-glow);
            transition: transform 0.3s ease;
        }

        h2 {
            margin: 0 0 12px 0;
            font-size: 34px;
            font-weight: 800;
            color: var(--text-dark);
            letter-spacing: -1px;
        }

        p {
            color: var(--text-muted);
            font-size: 16px;
            margin-bottom: 40px;
            line-height: 1.5;
        }

        .input-group {
            text-align: left;
            margin-bottom: 30px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 800;
            margin-bottom: 12px;
            margin-left: 6px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .input-group input {
            width: 100%;
            padding: 20px 24px;
            font-size: 16px;
            border-radius: 20px;
            border: 2px solid transparent;
            outline: none;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.02);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-group input:focus {
            background: white;
            border-color: var(--primary);
            box-shadow: 0 15px 30px var(--pink-glow);
            transform: translateY(-2px);
        }

        .btn {
            width: 100%;
            padding: 20px;
            font-size: 17px;
            font-weight: 700;
            border-radius: 20px;
            border: none;
            background: var(--primary);
            color: white;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 10px 20px rgba(214, 51, 132, 0.2);
        }

        .btn:hover {
            background: var(--primary-hover);
            transform: scale(1.03);
            box-shadow: 0 20px 40px rgba(214, 51, 132, 0.4);
        }

        .btn:active {
            transform: scale(0.97);
        }

        .btn svg {
            transition: transform 0.3s ease;
        }

        .btn:hover svg {
            transform: translateX(5px);
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="icon-badge">✨</div>
        <h2>Quiz App</h2>
        <p>Ready to prove your skills? <br>Enter your name to start.</p>
        
        <form onsubmit="check(event)">
            <div class="input-group">
                <label for="name">Your Name</label>
                <input type="text" id="name" placeholder="Type your name here...">
            </div>
            <button type="submit" class="btn">
                <span>Start Quiz</span>
                <svg width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3"></path>
                </svg>
            </button>
        </form>
    </div>

    <script src="welcome.js"></script>
</body>
</html>
